name: enterprise-ai-support-agent

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    env_file:
      - ./backend/.env

    volumes:
      - "${USERPROFILE}/.aws:/root/.aws:ro"

    ports:
      - "8000:8000"

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    ports:
      - "3000:80"

    depends_on:
      - backend

    restart: unless-stopped